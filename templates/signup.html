<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب جديد | بكسل كرافت</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'VT323', monospace; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #7f8c8d; padding: 40px; border: 6px solid #1a1a1a; box-shadow: 10px 10px 0px rgba(0,0,0,0.5); width: 350px; }
        h2 { text-align: center; color: #2ecc71; text-shadow: 3px 3px 0px #1a1a1a; font-size: 2.5em; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #34495e; border: 4px solid #1a1a1a; color: white; font-family: 'VT323'; font-size: 1.2em; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #d35400; color: white; border: 4px solid #a04000; font-family: 'VT323'; font-size: 1.5em; cursor: pointer; margin-top: 10px; }
        .link { text-align: center; margin-top: 15px; font-size: 1.1em; }
        a { color: #f1c40f; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>لاعب جديد؟ ✨</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" id="password" placeholder="كلمة السر" required 
             pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
             title="يجب أن تحتوي على 8 أحرف على الأقل، تتضمن حرفاً كبيراً ورمزا."> 
            <button type="submit">إنشاء الحساب</button>
        </form>
        <div class="link">لديك حساب؟ <a href="/login">سجل دخولك من هنا</a></div>
    </div>
</body>
</html>
