<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | بكسل كرافت</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'VT323', monospace; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #7f8c8d; padding: 40px; border: 6px solid #1a1a1a; box-shadow: 10px 10px 0px rgba(0,0,0,0.5); width: 350px; }
        h2 { text-align: center; color: #3498db; text-shadow: 3px 3px 0px #1a1a1a; font-size: 2.5em; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #34495e; border: 4px solid #1a1a1a; color: white; font-family: 'VT323'; font-size: 1.2em; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2980b9; color: white; border: 4px solid #1c5980; font-family: 'VT323'; font-size: 1.5em; cursor: pointer; margin-top: 10px; }
        .link { text-align: center; margin-top: 15px; font-size: 1.1em; }
        a { color: #97f80e; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول ⛏️</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <button type="submit">دخول اللعبة</button>
            <div class="link" style="font-size: 0.9em;">
          <a href="#" onclick="alert('يرجى التواصل مع الإدارة لاستعادة الحساب: jioe3el@gmail.com')">نسيت كلمة السر؟</a>
         </div>
        </form>
        <div class="link">أول مرة هنا؟ <a href="/signup">أنشئ حساباً جديداً</a></div>
    </div>
</body>
</html>
