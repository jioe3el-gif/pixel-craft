<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر البكسل | شحن النقاط</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'VT323', monospace; background-color: #2c3e50; color: white; text-align: center; padding: 50px; }
        .plans-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .plan-card {
            background: #7f8c8d; border: 6px solid #1a1a1a; padding: 20px; width: 250px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .plan-card:hover { transform: translateY(-10px); background: #95a5a6; }
        .price { font-size: 2.5em; color: #f1c40f; margin: 10px 0; }
        .points { font-size: 1.8em; color: #2ecc71; }
        .buy-btn {
            display: block; width: 100%; padding: 10px; background: #e67e22;
            color: white; border: 4px solid #d35400; font-family: 'VT323'; font-size: 1.5em;
            cursor: pointer; text-decoration: none; margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>💎 متجر شحن النقاط 💎</h1>
    <p>اختر الباقة المناسبة لزيادة قوتك الإبداعية:</p>
    
    <div class="plans-container">
        <div class="plan-card">
            <h2>باقة المبتدئ</h2>
            <div class="points">5 نقطة</div>
            <div class="price">10 ر.س</div>
            <a href="/checkout/10" class="buy-btn">شراء الآن 🛒</a>
        </div>

        <div class="plan-card">
            <h2 style="color: #9b59b6;">باقة المحترف</h2>
            <div class="points">10 نقطة</div> <div class="price">20 ر.س</div>
            <a href="/checkout/20" class="buy-btn">شراء الآن 🛒</a>
        </div>
    </div>
    
    <br><br>
    <a href="/" style="color: #bdc3c7;">⬅️ العودة للمنضدة</a>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=fetch"></script>
<script src="https://cdn.moyasar.com/mpf/1.13.0/moyasar.js"></script>
<link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.13.0/moyasar.css">

<div id="payment-form-container"></div>

<script>
  function startPayment(amountInRiyal) {
    var paymentForm = new moyasar.App({
      element: '#payment-form-container',
      amount: amountInRiyal * 100, // ميسر يحسب بالهللة (10 ريال = 1000 هللة)
      currency: 'SAR',
      description: 'شحن نقاط بكسل كرافت',
      publishable_api_key: 'pk_test_PVnbsZh9VfKX8ibnEQSAEgKp2N4w6akSC85EZXdr',
      callback_url: 'http://127.0.0.1:5000/success', // الرابط اللي بيرجع له بعد الدفع
      methods: ['creditcard', 'applepay', 'stcpay']
    });
  }
</script>
</body>
</html>
