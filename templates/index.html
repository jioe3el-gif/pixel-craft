<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0QRR625PL5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بكسل كرافت ✨| منصتك الذكية لتوليد المحتوى بالذكاء الاصطناعي</title>
    <meta name="description" content="بكسل كرافت يساعدك على كتابة مقالات احترافية وإبداعية بضغطة زر باستخدام ذكاء OpenAI. ابدأ الآن وارفع مستوى محتواك.">
    <meta name="keywords" content="ذكاء اصطناعي, كتابة مقالات, بكسل كرافت, OpenAI, محتوى رقمي">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'VT323', 'Segoe UI', monospace; /* خط ألعاب */
            background-color: #2c3e50; /* لون خلفية داكن يناسب الألعاب */
            color: white;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url('https://www.transparenttextures.com/patterns/dark-dot-pixel.png'); /* تأثير بكسل للخلفية */
        }

        .crafting-table {
            max-width: 650px;
            width: 100%;
            background-color: #7f8c8d; /* لون رمادي مثل الحجر */
            padding: 30px;
            border: 6px solid #1a1a1a; /* إطار أسود عريض */
            image-rendering: pixelated; /* الحفاظ على حدة البكسل */
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); /* ظل صلب */
        }

        h2 {
            text-align: center;
            color: #2ecc71; /* أخضر عشبي */
            text-shadow: 4px 4px 0px #1a1a1a; /* ظل خلف النص */
            font-size: 3em;
            margin-top: 0;
        }

        p {
            text-align: center;
            font-size: 1.3em;
            color: #ecf0f1;
        }

        .input-block {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            background-color: #34495e; /* لون بلوك الأوساخ الداكن */
            border: 5px solid #8e44ad; /* إطار أرجواني مثل بوابات الأوبسيديان */
            color: white;
            font-size: 1.2em;
            font-family: 'VT323', monospace;
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #9b59b6;
        }

        .craft-button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #d35400; /* بني برتقالي مثل بلوك اليقطين */
            color: white;
            border: 6px solid #a04000;
            font-size: 1.8em;
            font-family: 'VT323', monospace;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.1s;
            text-shadow: 2px 2px 0px #1a1a1a;
        }

        .craft-button:hover {
            background-color: #e67e22;
        }

        .craft-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        #result-display {
            margin-top: 25px;
            min-height: 50px;
            background-color: #ecf0f1; /* لون فاتح مثل الصوف */
            color: #2c3e50;
            padding: 20px;
            border: 5px solid #2ecc71; /* إطار أخضر */
            border-style: solid none solid none; /* حواف علوية وسفلية فقط */
            font-size: 1.2em;
            line-height: 1.6;
            text-align: right;
            white-space: pre-wrap; /* للحفاظ على تنسيق الفقرات */
            image-rendering: auto; /* عدم تنعيم النص */
        }
    </style>
</head>
<body>
    <div class="crafting-table">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; background: #1a1a1a; padding: 10px; border: 3px solid #7f8c8d;">
        <span style="color: #3498db;">👤 اللاعب: {{ user.username }}</span>
        <span style="color: #f1c40f;">💎 النقاط: <span id="creditCount">{{ user.credits }}</span></span>
        <a href="/logout" style="color: #e74c3c; text-decoration: none;">🚪 خروج</a>
        </div>

        <h2>منضدة الصنع الذكية ⛏️ PIXEL CRAFT! </h2>
        <p style="color: #f1c40f;">نقاطك المتبقية: <span id="creditCount">{{ user.credits }}</span></p>
        <p>ضع أفكارك الخام في الصندوق أدناه، وسأصنع لك مقالاً احترافياً:</p>
        
        <div class="input-block">
            <textarea id="rawThoughts" placeholder="مثال:
* أهمية القراءة
* تنمية العقل
* فتح آفاق جديدة"></textarea>
        </div>

        <button class="craft-button" onclick="startCrafting()">إبدأ الصنع! </button>

        
        <div id="result-display">المقال المصنوع سيظهر هنا...</div>
    </div>

<div style="margin-top: 20px; border: 4px dashed #f1c40f; padding: 15px; background-color: rgba(0,0,0,0.2); border-radius: 10px;">
    <h3 style="color: #f1c40f; text-shadow: 2px 2px #000;">💎 شحن الرصيد</h3>
    <div style="display: flex; gap: 10px; justify-content: center;">
        
        <a href="{{ url_for('checkout', amount=10) }}" style="text-decoration: none;">
            <button style="background: #27ae60; padding: 10px; cursor:pointer; color: white; border: 4px solid #1e8449; font-family: 'VT323', monospace; font-size: 1.1em;">
                5 نقطة بـ 10 ريال
            </button>
        </a>

        <a href="{{ url_for('checkout', amount=20) }}" style="text-decoration: none;">
            <button style="background: #2980b9; padding: 10px; cursor:pointer; color: white; border: 4px solid #21618c; font-family: 'VT323', monospace; font-size: 1.1em;">
                10 نقطة بـ 20 ريال
            </button>
        </a>

    </div>
</div>

    <script>
        async function startCrafting() {
            const input = document.getElementById('rawThoughts').value;
            const resBox = document.getElementById('result-display');
            
            // تحقق بسيط من المدخلات
            if (input.trim() === "") {
                resBox.innerText = "❌ الصندوق فارغ! ضع بعض الأفكار الخام أولاً.";
                resBox.style.borderColor = "#e74c3c"; // إطار أحمر خطأ
                return;
            }

            resBox.innerHTML = '<div class="loading-pixel">⏳ جاري دمج البكسلات...</div>';
            resBox.style.borderColor = "#f1c40f"; // إطار أصفر جاري العمل
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: input })
                });
                
                const data = await response.json();
                
                resBox.innerText = data.text;
                resBox.style.borderColor = "#2ecc71"; // إطار أخضر نجاح

            } catch (error) {
                console.error('Error:', error);
                resBox.innerText = "❌ حدث خطأ غير متوقع أثناء الصنع!";
                resBox.style.borderColor = "#e74c3c"; // إطار أحمر خطأ
            }
        }
    </script>
</body>
</html>
