<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'VT323', monospace; background-color: #1a1a1a; color: #2ecc71; padding: 20px; }
        h2 { text-align: center; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #2c3e50; }
        th, td { border: 2px solid #2ecc71; padding: 10px; text-align: center; }
        th { background: #1a1a1a; color: #f1c40f; }
        .back-btn { display: inline-block; margin-top: 20px; color: #e74c3c; text-decoration: none; border: 1px solid #e74c3c; padding: 5px 10px; }
    </style>
</head>
<body>
    <h2>📟 نظام مراقبة قاعدة البيانات (SQL)</h2>
    <table>
        <tr>
            <th>المعرف (ID)</th>
            <th>اسم اللاعب</th>
            <th>كلمة السر (خلف الكواليس)</th>
            <th>الرصيد 💎</th>
        </tr>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.password }}</td>
            <td>{{ u.credits }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="/" class="back-btn">⬅️ العودة للمنضدة</a>
</body>
</html>
